<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Switch control / Progressive Enhancement / FDND</title>
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
		<link href="assets/styles.css" rel="stylesheet">
		<style>
			:root{
				--color-primary:#46166B;
				--color-primary-light:#EBDFF5;
			}
			/*basis*/
			input{
				display: inline-block;
				width: 2rem;
				height: 2rem;
			}

			/*progressive enhancemnt*/
			@supports (transform: translateX(0)) and (transition: 0.3s ease) {
				input{
					display: none;
				}
				label{
					width: 8rem;
					height: 4rem;
					background-color: var(--color-primary-light);
					border: 0.3rem solid var(--color-primary-light);
					outline: 0.3rem solid var(--color-primary);
					border-radius: 99px;
					position: relative;
					display: flex;
					align-items: center;
					cursor: pointer;
				}
				label::before{
					content: '';
					width: 4rem;
					height: 4rem;
					background-color: var(--color-primary);
					border-radius: 50%;
					position: absolute;
					left: 0.1rem;
					transition: transform 0.3s ease;
				}
				input:checked + label{
					background-color: green;
					border: 0.3rem solid green;
				} 
				input:checked + label::before{
					transform: translateX(3.8rem);
					content: "AAN";
					align-items: center;
					display: flex;          
  					justify-content: center;
				} 
			}
			@media (prefers-reduced-motion: reduce) {
				label::before {
					transition: none;
				}
			}
			
		</style>
	</head>
	<body>
		<h1>Switch control</h1>
		
		<input type="checkbox" id="toggle">
		<label for="toggle"></label>
		

		<details open>
			<summary>Demo video</summary>
			<video src="assets/switch.mp4" width="119" height="67" controls muted autoplay loop>
				<a href="assets/switch.mp4">assets/switch.mp4</a>
			</video>
		</details>
	</body>
</html>
